<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes">
    <title>렌주룰 AI 힌트 오목</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 15px;
            overflow: auto !important;
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
        }
        h1 { 
            margin-top: 5px;
            margin-bottom: 15px; 
            color: #333; 
            font-size: 1.6rem;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }
        .board-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            justify-content: flex-start;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        @media (min-width: 650px) {
            .container { flex-direction: row; align-items: flex-start; }
            .board-wrapper { justify-content: center; overflow: visible; width: auto; }
        }
        canvas {
            background-color: #E3A857;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-radius: 4px;
            cursor: pointer;
            min-width: 600px;
            min-height: 600px;
        }
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel-title { font-size: 1.2rem; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .radio-group { display: flex; flex-direction: column; gap: 8px; }
        button {
            border: 2px solid #FBC02D;
            border-radius: 4px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        #hintBtn {
            background-color: #f5f5f5;
            border-color: #ccc;
            color: #666;
        }
        #hintBtn.active {
            background-color: #FFF176;
            border-color: #FBC02D;
            color: #000;
        }
        .rules { font-size: 0.85rem; color: #666; line-height: 1.5; background: #f9f9f9; padding: 10px; border-radius: 4px; }
        .turn-info { font-weight: bold; font-size: 1.1rem; text-align: center; padding: 5px; border-radius: 4px; }
        .black-turn { background: #000; color: #fff; }
        .white-turn { background: #fff; color: #000; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>렌주룰 & AI 시각화 오목</h1>
    
    <div class="container">
        <div class="board-wrapper">
            <canvas id="omokBoard" width="600" height="600"></canvas>
        </div>
        
        <div class="control-panel">
            <div class="panel-title">게임 제어</div>
            <div id="turnDisplay" class="turn-info black-turn">흑돌(나) 차례</div>
            
            <div>
                <div style="font-weight: bold; margin-bottom: 5px;">[ 난이도 선택 ]</div>
                <div class="radio-group">
                    <label><input type="radio" name="difficulty" value="Easy"> 하 (Easy)</label>
                    <label><input type="radio" name="difficulty" value="Medium"> 중 (Medium)</label>
                    <label><input type="radio" name="difficulty" value="Hard" checked> 상 (Hard)</label>
                </div>
            </div>
            
            <button id="hintBtn"> AI 추천 수 시각화 : OFF</button>
            <button id="undoBtn" style="background-color: #e0e0e0; border-color: #bdbdbd; color: #333;"> 한 수 무르기 (뒤로가기)</button>
            <button id="resetBtn" style="background-color: #ff8a80; border-color: #e53935; color: white;"> 게임 리셋</button>
            
            <div class="rules">
                <strong>※ 렌주룰(Renju) 적용</strong><br>
                - 흑(선공): 33, 44, 장목(6목 이상) 금지<br>
                - 백(후공): 제약 없음<br>
                * 금수 자리는 AI 추천에서 제외됩니다.<br>
                <span style="color: blue; font-weight: bold;">● 파랑</span>: 두면 바로 승리하는 자리<br>
                <span style="color: red; font-weight: bold;">● 빨강</span>: 안 두면 바로 패배하는 자리
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('omokBoard');
const ctx = canvas.getContext('2d');
const turnDisplay = document.getElementById('turnDisplay');
const hintBtn = document.getElementById('hintBtn');

const boardSize = 15;
const cellSize = 40;
const margin = 20;

let board = Array.from({ length: boardSize }, () => Array(boardSize).fill(0));
let currentPlayer = 1; // 1: 흑, 2: 백
let visualElements = [];
let moveHistory = [];
let isHintOn = false;

function drawBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 1;

    for (let i = 0; i < boardSize; i++) {
        ctx.beginPath();
        ctx.moveTo(margin, margin + i * cellSize);
        ctx.lineTo(margin + (boardSize - 1) * cellSize, margin + i * cellSize);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(margin + i * cellSize, margin);
        ctx.lineTo(margin + i * cellSize, margin + (boardSize - 1) * cellSize);
        ctx.stroke();
    }

    const center = margin + 7 * cellSize;
    ctx.beginPath();
    ctx.arc(center, center, 4, 0, 2 * Math.PI);
    ctx.fillStyle = '#000000';
    ctx.fill();

    for (let y = 0; y < boardSize; y++) {
        for (let x = 0; x < boardSize; x++) {
            if (board[y][x] !== 0) drawStone(x, y, board[y][x]);
        }
    }

    if (isHintOn) {
        calculateAndReadyHint();
        visualElements.forEach(elem => elem());
    }
}

function drawStone(x, y, player) {
    const cx = margin + x * cellSize;
    const cy = margin + y * cellSize;
    const r = cellSize / 2 - 2;

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    if (player === 1) {
        ctx.fillStyle = '#000000';
        ctx.fill();
    } else {
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.strokeStyle = '#000000';
        ctx.stroke();
    }
}

function countStones(x, y, dx, dy, player) {
    let count = 1;
    let openEnds = 0;

    let nx = x + dx, ny = y + dy;
    while (nx >= 0 && nx < boardSize && ny >= 0 && ny < boardSize && board[ny][nx] === player) {
        count++; nx += dx; ny += dy;
    }
    if (nx >= 0 && nx < boardSize && ny >= 0 && ny < boardSize && board[ny][nx] === 0) openEnds++;

    nx = x - dx; ny = y - dy;
    while (nx >= 0 && nx < boardSize && ny >= 0 && ny < boardSize && board[ny][nx] === player) {
        count++; nx -= dx; ny -= dy;
    }
    if (nx >= 0 && nx < boardSize && ny >= 0 && ny < boardSize && board[ny][nx] === 0) openEnds++;

    return { count, openEnds };
}

function checkForbidden(x, y, player) {
    if (player !== 1) return { forbidden: false, reason: "" };

    const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
    let threeCount = 0;
    let fourCount = 0;

    for (let [dx, dy] of directions) {
        let { count, openEnds } = countStones(x, y, dx, dy, player);

        if (count > 5) return { forbidden: true, reason: "장목(6목 이상)" };
        if (count === 3 && openEnds === 2) threeCount++;
        if (count === 4) fourCount++;
    }

    if (threeCount >= 2) return { forbidden: true, reason: "삼삼(3-3)" };
    if (fourCount >= 2) return { forbidden: true, reason: "사사(4-4)" };

    return { forbidden: false, reason: "" };
}

function evaluatePosition(x, y, player) {
    const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
    let score = 0;
    let isWinMove = false;

    for (let [dx, dy] of directions) {
        let { count } = countStones(x, y, dx, dy, player);
        
        // 렌주룰 규칙 반영한 승리 조건 체크
        if (player === 1 && count === 5) isWinMove = true;
        if (player === 2 && count >= 5) isWinMove = true;

        if (count === 5) score += 100000;
        else if (count === 4) score += 5000;
        else if (count === 3) score += 500;
        else if (count === 2) score += 50;
    }
    return { score, isWinMove };
}

function getAIMoves() {
    let moves = [];
    for (let y = 0; y < boardSize; y++) {
        for (let x = 0; x < boardSize; x++) {
            if (board[y][x] === 0) {
                if (currentPlayer === 1 && checkForbidden(x, y, 1).forbidden) continue;

                let myEval = evaluatePosition(x, y, currentPlayer);
                let enemy = currentPlayer === 1 ? 2 : 1;
                let enemyEval = evaluatePosition(x, y, enemy);

                // 결정적인 공격/방어 상태 태그 지정
                let type = "normal";
                if (myEval.isWinMove) {
                    type = "win";   // 두면 바로 이기는 자리 (파랑)
                } else if (enemyEval.isWinMove) {
                    type = "block"; // 안 두면 바로 지는 자리 (빨강)
                }

                let totalScore = myEval.score + (enemyEval.score * 1.2);
                moves.push({ x, y, score: totalScore, type: type });
            }
        }
    }
    moves.sort((a, b) => b.score - a.score);
    return moves;
}

// AI 힌트 계산 및 그리기 함수 (빨강, 파랑 조건 최우선 반영)
function calculateAndReadyHint() {
    visualElements = [];
    let bestMoves = getAIMoves();
    if (bestMoves.length === 0) return;

    // 1단계: 승리 확정(win)이나 필사 방어(block)가 있는지 먼저 필터링합니다.
    let specialMoves = bestMoves.filter(m => m.type === "win" || m.type === "block");

    if (specialMoves.length > 0) {
        // 결정적인 자리가 있으면 일반 1,2,3 메달 대신 빨강/파랑 점만 강조하여 보여줍니다.
        specialMoves.forEach(move => {
            const color = (move.type === "win") ? "#00E5FF" : "#FF1744"; // 파랑(Win) / 빨강(Block)
            const text = (move.type === "win") ? "승리" : "방어";

            visualElements.push(() => {
                const cx = margin + move.x * cellSize;
                const cy = margin + move.y * cellSize;
                const r = cellSize / 2.5;

                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#000000';
                ctx.stroke();

                ctx.fillStyle = (move.type === "win") ? '#000000' : '#ffffff';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, cx, cy);
            });
        });
        return; // 특별 노드 렌더링 후 조기 종료
    }

    // 2단계: 결정적인 자리가 없을 때만 기존 난이도별 1, 2, 3 메달을 표시합니다.
    const diff = document.querySelector('input[name="difficulty"]:checked').value;
    let displayMoves = [];

    if (diff === "Easy" && bestMoves.length > 5) {
        displayMoves = bestMoves.slice(0, 7).sort(() => 0.5 - Math.random()).slice(0, 3);
    } else if (diff === "Medium" && bestMoves.length > 3) {
        displayMoves = bestMoves.slice(0, 4).sort(() => 0.5 - Math.random()).slice(0, 3);
    } else {
        displayMoves = bestMoves.slice(0, 3);
    }

    const rankStyles = [
        { bg: "#FFD700", text: "1" },
        { bg: "#C0C0C0", text: "2" },
        { bg: "#CD7F32", text: "3" }
    ];

    displayMoves.forEach((move, index) => {
        if (index >= rankStyles.length) return;
        const style = rankStyles[index];

        visualElements.push(() => {
            const cx = margin + move.x * cellSize;
            const cy = margin + move.y * cellSize;
            const r = cellSize / 3;

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.fillStyle = style.bg;
            ctx.fill();
            ctx.strokeStyle = '#000000';
            ctx.stroke();

            ctx.fillStyle = '#000000';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(style.text, cx, cy);
        });
    });
}

function toggleAIHint() {
    isHintOn = !isHintOn;

    if (isHintOn) {
        hintBtn.textContent = "AI 추천 수 시각화 : ON";
        hintBtn.classList.add('active');
    } else {
        hintBtn.textContent = "AI 추천 수 시각화 : OFF";
        hintBtn.classList.remove('active');
        visualElements = [];
    }
    drawBoard();
}

function checkWin(x, y, player) {
    const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
    for (let [dx, dy] of directions) {
        let { count } = countStones(x, y, dx, dy, player);
        if (player === 1 && count === 5) return true;
        if (player === 2 && count >= 5) return true;
    }
    return false;
}

function updateTurnUI() {
    if(currentPlayer === 1) {
        turnDisplay.textContent = "흑돌(나) 차례";
        turnDisplay.className = "turn-info black-turn";
    } else {
        turnDisplay.textContent = "백돌(상대) 차례";
        turnDisplay.className = "turn-info white-turn";
    }
}

canvas.addEventListener('click', (event) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    const mouseX = (event.clientX - rect.left) * scaleX;
    const mouseY = (event.clientY - rect.top) * scaleY;

    const x = Math.round((mouseX - margin) / cellSize);
    const y = Math.round((mouseY - margin) / cellSize);

    if (x < 0 || x >= boardSize || y < 0 || y >= boardSize) return;
    if (board[y][x] !== 0) return;

    if (currentPlayer === 1) {
        const { forbidden, reason } = checkForbidden(x, y, 1);
        if (forbidden) {
            alert(`렌주룰 제한: ${reason} 자리는 착수할 수 없습니다!`);
            return;
        }
    }

    board[y][x] = currentPlayer;
    moveHistory.push({ x, y, player: currentPlayer });

    if (checkWin(x, y, currentPlayer)) {
        drawBoard();
        setTimeout(() => {
            alert(`${currentPlayer === 1 ? '흑돌' : '백돌'}의 승리입니다!`);
            resetGame();
        }, 10);
        return;
    }

    currentPlayer = (currentPlayer === 1) ? 2 : 1;
    updateTurnUI();
    drawBoard();
});

function undoMove() {
    if (moveHistory.length === 0) {
        alert("되돌릴 기록이 없습니다!");
        return;
    }

    const lastMove = moveHistory.pop();
    board[lastMove.y][lastMove.x] = 0;
    currentPlayer = lastMove.player;
    
    updateTurnUI();
    drawBoard();
}

function resetGame() {
    board = Array.from({ length: boardSize }, () => Array(boardSize).fill(0));
    currentPlayer = 1;
    moveHistory = [];
    
    updateTurnUI();
    drawBoard();
}

document.querySelectorAll('input[name="difficulty"]').forEach(radio => {
    radio.addEventListener('change', () => {
        if (isHintOn) drawBoard();
    });
});

hintBtn.addEventListener('click', toggleAIHint);
document.getElementById('undoBtn').addEventListener('click', undoMove);
document.getElementById('resetBtn').addEventListener('click', resetGame);

drawBoard();
</script>
</body>
</html>
